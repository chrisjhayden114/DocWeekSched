<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0033a0" />
    <title>Offline</title>
    <style>
      :root {
        --gray-50: #fafafa;
        --gray-200: #e5e5e5;
        --gray-600: #525252;
        --gray-900: #161616;
        --primary: #0033a0;
        --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        background: var(--gray-50);
        color: var(--gray-900);
        font: 400 17px/1.6 var(--font);
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: #ffffff;
        border: 1px solid var(--gray-200);
        border-radius: 10px;
        padding: 28px 24px;
      }
      h1 {
        margin: 0 0 8px;
        font: 600 22px/28px var(--font);
      }
      p {
        margin: 0 0 20px;
        color: var(--gray-600);
        font: 400 15px/24px var(--font);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 8px 14px;
        border-radius: 6px;
        background: var(--primary);
        color: #ffffff;
        font: 500 14px/20px var(--font);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You’re offline</h1>
      <p>
        Open Agenda, a session, or Maps once while online — we’ll keep those pages available for the next time
        the connection drops.
      </p>
      <a href="/dashboard">Try Agenda</a>
    </main>
  </body>
</html>
